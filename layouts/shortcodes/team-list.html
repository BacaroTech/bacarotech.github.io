<div class="container">
<div class="row">
{{ range site.Data.team.members }}
  {{- $imgSrc := resources.Get .imgSrc -}}
  <div class="col-sm-6 col-md-4 col-12 pb-5">
    <div class="card h-100">
      <img src="{{ $imgSrc }}" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title text-center">{{ .title }}</h5>
        {{ with .ruolo }}<h6 class="card-title text-center">{{ . }}</h6>{{ end }}
        <p class="card-text text-center">{{ .content }}</p>
      </div>
      <a href="{{ .button_url | absURL }}" target="_blank" class="btn card-footer">
        <i class="icon-user"></i>
        Linkedin
      </a>
    </div>
  </div>
{{ end }}
</div>
</div>
